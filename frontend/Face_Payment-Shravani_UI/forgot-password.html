<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Your Password? - BillMe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #0d47a1;
            --secondary: #34a853;
            --light-gray: #f8f9fa;
            --medium-gray: #e8eaed;
            --dark-gray: #5f6368;
            --text: #202124;
            --white: #ffffff;
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            --gradient: linear-gradient(135deg, #1a73e8 0%, #34a853 100%);
            --error: #ea4335;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .forgot-container {
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 450px;
            text-align: center;
            animation: modalFadeIn 0.3s ease-out;
            transition: all 0.2s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .logo-icon {
            background: var(--gradient);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h2 {
            margin-bottom: 10px;
            color: var(--primary);
        }

        p.subtitle {
            color: var(--dark-gray);
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text);
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--medium-gray);
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .error-message {
            color: var(--error);
            font-size: 14px;
            margin-top: 5px;
            display: none;
            text-align: left;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            background-color: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn:disabled {
            background-color: var(--medium-gray);
            cursor: not-allowed;
            color: var(--dark-gray);
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            text-align: center;
        }

        .alert-success {
            background-color: #e6f4ea;
            color: var(--secondary);
            border: 1px solid #ceead6;
        }

        .alert-error {
            background-color: #fce8e6;
            color: var(--error);
            border: 1px solid #fad2cf;
        }

        .back-link {
            display: block;
            margin-top: 25px;
            color: var(--dark-gray);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--primary);
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="forgot-container">
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-bolt"></i>
            </div>
            BillMe
        </div>
        <h2>Forgot Your Password?</h2>
        <p class="subtitle" id="formSubtitle">Enter your email address and we'll send you a link to reset your password.
        </p>

        <div id="alertBox" class="alert"></div>

        <form id="forgotForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email address">
                <div class="error-message" id="emailError">Please enter a valid email address.</div>
            </div>

            <button type="submit" class="btn" id="submitBtn">
                <span id="btnText">Send Reset Link</span>
                <div class="loader" id="btnLoader"></div>
            </button>
        </form>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
    </div>

    <script src="forgot-password.js"></script>
</body>

</html>
