spring.application.name=billme-backend

server.port=8080

# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/billme_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET}

# Razorpay
razorpay.key-id=rzp_test_SIgyziHVJLgRT2
razorpay.key-secret=${RAZORPAY_KEY_SECRET}
razorpay.webhook-secret=billme_webhook_secret

# Fees
processing.fee.percent=2
platform.withdrawal.fee-percent=2

# Admin bootstrap
app.admin.bootstrap.enabled=${ADMIN_BOOTSTRAP:false}
app.admin.bootstrap.email=${ADMIN_EMAIL:}
app.admin.bootstrap.password=${ADMIN_PASSWORD:}

# Payment URL
app.payment.url=http://localhost:5173/pay